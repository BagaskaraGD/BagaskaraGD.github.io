  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ystem (mappable to Tailwind tokens for Astro impl)\n   ========================================================= */\n\n:root {\n  /* Surfaces */\n  --bg-0: #060912;          /* deepest base */\n  --bg-1: #0a1124;          /* panel base */\n  --bg-2: #101a36;          /* raised panel */\n  --bg-3: #18244a;          /* hover/active */\n  --panel: rgba(10, 16, 38, 0.72);\n  --panel-strong: rgba(10, 16, 38, 0.88);\n\n  /* Lines */\n  --line: rgba(120, 160, 255, 0.10);\n  --line-2: rgba(120, 180, 255, 0.18);\n  --line-strong: rgba(120, 180, 255, 0.32);\n\n  /* Text */\n  --text-1: #e6ecf6;\n  --text-2: #9fb0c9;\n  --text-3: #6c7b96;\n  --text-dim: #4a5775;\n\n  /* Accents */\n  --cyan: #22d3ee;\n  --cyan-2: #67e8f9;\n  --cyan-glow: rgba(34, 211, 238, 0.45);\n  --blue: #60a5fa;\n  --purple: #a78bfa;\n  --emerald: #34d399;\n  --amber: #fbbf24;\n  --rose: #fb7185;\n\n  /* Radius, shadow */\n  --r-sm: 8px;\n  --r-md: 12px;\n  --r-lg: 18px;\n  --r-xl: 24px;\n  --shadow-glow: 0 0 0 1px rgba(34, 211, 238, 0.18), 0 30px 60px -20px rgba(34, 211, 238, 0.18);\n  --shadow-panel: 0 1px 0 rgba(255, 255, 255, 0.04) inset, 0 30px 80px -30px rgba(0, 0, 0, 0.7);\n\n  /* Type */\n  --font-display: \"Sora\", \"Space Grotesk\", system-ui, sans-serif;\n  --font-body: \"Sora\", system-ui, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, monospace;\n  --font-pixel: \"VT323\", \"JetBrains Mono\", monospace;\n\n  /* =======================================================\n     Sky cycle tokens — interpolated by JS during scroll.\n     Defaults below = MIDNIGHT.\n     ======================================================= */\n  --sky-0: #03050f;\n  --sky-1: #060c22;\n  --sky-2: #091434;\n  --sky-3: #0a1b3e;\n  --sky-4: #0c2046;\n\n  --mtn-far-top: #2a3666;\n  --mtn-far-bot: #161f44;\n  --mtn-mid-top: #1b2750;\n  --mtn-mid-bot: #0b1530;\n  --hills-top:   #0e1a3a;\n  --hills-bot:   #070d24;\n  --forest-bg-top: #091022;\n  --forest-bg-bot: #04081a;\n  --forest-front:  #02050d;\n  --forest-back:   #06112a;\n  --fore-top: #02050e;\n  --fore-bot: #01030a;\n\n  --rim-far: rgba(167, 139, 250, 0.35);\n  --rim-mid: rgba(34, 211, 238, 0.55);\n  --snow:    rgba(228, 239, 255, 0.85);\n  --castle-window: rgba(251, 191, 36, 0.92);\n  --grass-stroke:  rgba(34, 211, 238, 0.25);\n\n  --horizon-a: rgba(34, 211, 238, 0.55);\n  --horizon-b: rgba(167, 139, 250, 0.40);\n  --fog-tint:  rgba(196, 220, 255, 0.16);\n\n  --star-op: 0.9;\n  --cloud-op: 0;\n\n  /* Celestial bodies (translated relative to anchor on horizon line) */\n  --moon-op: 1;\n  --sun-op: 0;\n  --moon-x: 0px;\n  --moon-y: -240px;\n  --sun-x: 0px;\n  --sun-y: 0px;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: var(--bg-0);\n  color: var(--text-1);\n  font-family: var(--font-body);\n  font-size: 16px;\n  line-height: 1.55;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; }\n\n/* =========================================================\n   Page background — stylized 2D RPG world (60%) + AI overlay (40%)\n   ========================================================= */\n.page-bg {\n  position: fixed;\n  inset: 0;\n  z-index: 0;\n  pointer-events: none;\n  overflow: hidden;\n  /* Sky gradient driven by CSS vars (interpolated on scroll) */\n  background:\n    radial-gradient(900px 600px at 78% 18%, rgba(99, 102, 241, 0.10), transparent 60%),\n    linear-gradient(180deg,\n      var(--sky-0) 0%,\n      var(--sky-1) 30%,\n      var(--sky-2) 56%,\n      var(--sky-3) 80%,\n      var(--sky-4) 100%);\n  transition: background 0.4s ease;\n}\n\n/* --- Stars layer (tiny twinkling specks) --- */\n.bg-stars {\n  position: absolute;\n  inset: 0;\n  /* generated star field — multiple radial-gradients */\n  background-image:\n    radial-gradient(1px 1px at 12% 8%, rgba(255,255,255,0.85), transparent 60%),\n    radial-gradient(1px 1px at 22% 18%, rgba(255,255,255,0.55), transparent 60%),\n    radial-gradient(1px 1px at 35% 6%, rgba(196,248,255,0.8), transparent 60%),\n    radial-gradient(1.5px 1.5px at 48% 14%, rgba(255,255,255,0.9), transparent 60%),\n    radial-gradient(1px 1px at 58% 22%, rgba(196,248,255,0.6), transparent 60%),\n    radial-gradient(1px 1px at 66% 8%, rgba(255,255,255,0.65), transparent 60%),\n    radial-gradient(1.5px 1.5px at 73% 18%, rgba(255,255,255,0.85), transparent 60%),\n    radial-gradient(1px 1px at 81% 5%, rgba(255,255,255,0.55), transparent 60%),\n    radial-gradient(1px 1px at 90% 16%, rgba(196,248,255,0.7), transparent 60%),\n    radial-gradient(1px 1px at 6% 24%, rgba(255,255,255,0.55), transparent 60%),\n    radial-gradient(1.5px 1.5px at 28% 32%, rgba(255,255,255,0.75), transparent 60%),\n    radial-gradient(1px 1px at 42% 30%, rgba(196,248,255,0.55), transparent 60%),\n    radial-gradient(1px 1px at 55% 36%, rgba(255,255,255,0.6), transparent 60%),\n    radial-gradient(1px 1px at 68% 32%, rgba(255,255,255,0.5), transparent 60%),\n    radial-gradient(1.5px 1.5px at 85% 28%, rgba(255,255,255,0.85), transparent 60%),\n    radial-gradient(1px 1px at 96% 36%, rgba(196,248,255,0.6), transparent 60%);\n  height: 60%;\n  opacity: var(--star-op, 0.9);\n  transition: opacity 0.5s ease;\n}\n@keyframes twinkle {\n  0%, 100% { filter: brightness(1); }\n  50% { filter: brightness(0.7); }\n}\n.bg-stars { animation: twinkle 4.5s ease-in-out infinite; }\n\n/* --- Moon --- */\n.bg-moon {\n  position: absolute;\n  top: 62%;\n  left: 50%;\n  width: 110px;\n  height: 110px;\n  margin-top: -55px;\n  margin-left: -55px;\n  border-radius: 50%;\n  background:\n    radial-gradient(circle at 35% 35%, #f1f7ff 0%, #cfe7ff 35%, #93b8e3 70%, #2a3f6e 100%);\n  box-shadow:\n    0 0 70px rgba(168, 210, 255, 0.45),\n    0 0 160px rgba(99, 145, 220, 0.35),\n    inset -10px -16px 30px rgba(0, 0, 0, 0.35);\n  transform: translate3d(var(--moon-x), var(--moon-y), 0);\n  opacity: var(--moon-op);\n  transition: opacity 0.45s ease;\n  will-change: transform, opacity;\n}\n.bg-moon::after {\n  content: \"\";\n  position: absolute;\n  inset: -22px;\n  border-radius: 50%;\n  border: 1px solid rgba(196, 248, 255, 0.18);\n  box-shadow: 0 0 40px rgba(34, 211, 238, 0.2) inset;\n}\n\n/* --- Sun --- */\n.bg-sun {\n  position: absolute;\n  top: 62%;\n  left: 50%;\n  width: 130px;\n  height: 130px;\n  margin-top: -65px;\n  margin-left: -65px;\n  border-radius: 50%;\n  background:\n    radial-gradient(circle at 50% 50%,\n      #fffaeb 0%,\n      #ffe6a0 24%,\n      #ffc257 52%,\n      #ff9132 76%,\n      #d65a18 100%);\n  box-shadow:\n    0 0 90px rgba(255, 200, 110, 0.55),\n    0 0 220px rgba(255, 158, 70, 0.45),\n    0 0 380px rgba(255, 130, 50, 0.25);\n  transform: translate3d(var(--sun-x), var(--sun-y), 0);\n  opacity: var(--sun-op);\n  transition: opacity 0.45s ease;\n  will-change: transform, opacity;\n}\n.bg-sun::before {\n  /* outer warm halo ring */\n  content: \"\";\n  position: absolute;\n  inset: -34px;\n  border-radius: 50%;\n  border: 1px solid rgba(255, 220, 140, 0.35);\n  box-shadow: 0 0 50px rgba(255, 220, 140, 0.4) inset;\n}\n.bg-sun::after {\n  /* subtle lens-flare ray */\n  content: \"\";\n  position: absolute;\n  inset: -100px;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(255, 220, 140, 0.22), transparent 55%);\n  pointer-events: none;\n}\n\n/* --- Clouds (visible during day) --- */\n.bg-clouds {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  opacity: var(--cloud-op, 0);\n  transition: opacity 0.7s ease;\n}\n.cloud {\n  position: absolute;\n  background:\n    radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.55) 35%, transparent 60%),\n    radial-gradient(ellipse at 65% 55%, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.45) 40%, transparent 60%);\n  filter: blur(8px);\n  border-radius: 100px;\n  animation: cloudDrift 90s linear infinite;\n  will-change: transform;\n}\n.cloud-1 { top: 10%; left: -12%; width: 320px; height: 90px; animation-duration: 110s; }\n.cloud-2 { top: 22%; left: 24%; width: 240px; height: 70px; animation-duration: 140s; animation-delay: -40s; opacity: 0.85; }\n.cloud-3 { top: 14%; left: 60%; width: 280px; height: 80px; animation-duration: 100s; animation-delay: -65s; }\n.cloud-4 { top: 30%; left: -4%; width: 220px; height: 60px; animation-duration: 130s; animation-delay: -90s; opacity: 0.75; }\n.cloud-5 { top: 8%;  left: 82%; width: 260px; height: 72px; animation-duration: 120s; animation-delay: -20s; opacity: 0.9; }\n.cloud-6 { top: 36%; left: 44%; width: 200px; height: 56px; animation-duration: 150s; animation-delay: -50s; opacity: 0.7; }\n@keyframes cloudDrift {\n  from { transform: translateX(-8vw); }\n  to   { transform: translateX(110vw); }\n}\n\n/* --- Wireframe grid (now very subtle, scoped to upper portion only) --- */\n.bg-grid {\n  position: absolute;\n  inset: 0;\n  background-image:\n    linear-gradient(to right, rgba(120, 180, 255, 0.045) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(120, 180, 255, 0.045) 1px, transparent 1px);\n  background-size: 72px 72px;\n  mask-image:\n    radial-gradient(ellipse 85% 55% at 50% 22%, #000 10%, transparent 70%);\n  -webkit-mask-image:\n    radial-gradient(ellipse 85% 55% at 50% 22%, #000 10%, transparent 70%);\n  opacity: 0.55;\n}\n\n/* --- Horizon glow line --- */\n.bg-horizon {\n  position: absolute;\n  left: 0; right: 0;\n  top: 62%;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--horizon-a), var(--horizon-b), transparent);\n  filter: blur(0.5px);\n  opacity: 0.7;\n  transition: background 0.4s ease;\n}\n.bg-horizon::before {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0;\n  top: -80px;\n  height: 160px;\n  background: linear-gradient(180deg, transparent, color-mix(in srgb, var(--horizon-a) 100%, transparent) 40%, color-mix(in srgb, var(--horizon-b) 80%, transparent) 70%, transparent);\n  filter: blur(24px);\n  transition: background 0.4s ease;\n}\n\n/* --- Landscape SVG layers --- */\n.bg-layer {\n  position: absolute;\n  left: -2%;\n  right: -2%;\n  bottom: 0;\n  width: 104%;\n  pointer-events: none;\n}\n.bg-mtn-far  { bottom: 38%; height: 22%; opacity: 0.85; }\n.bg-mtn-mid  { bottom: 28%; height: 24%; }\n.bg-hills    { bottom: 16%; height: 22%; }\n.bg-forest   { bottom: 6%;  height: 22%; }\n.bg-fore     { bottom: 0;   height: 18%; }\n\n.bg-layer svg { display: block; width: 100%; height: 100%; }\n\n/* --- Fog bands between layers (drifts slowly) --- */\n.bg-fog {\n  position: absolute;\n  left: -20%;\n  right: -20%;\n  width: 140%;\n  height: 90px;\n  background: radial-gradient(ellipse at center, var(--fog-tint) 0%, color-mix(in srgb, var(--fog-tint) 40%, transparent) 40%, transparent 70%);\n  filter: blur(14px);\n  pointer-events: none;\n  animation: fogDrift 22s ease-in-out infinite;\n  transition: background 0.5s ease;\n}\n.bg-fog-1 { bottom: 36%; opacity: 0.85; animation-duration: 26s; }\n.bg-fog-2 { bottom: 22%; opacity: 0.9; animation-direction: reverse; animation-duration: 32s; }\n.bg-fog-3 { bottom: 9%;  opacity: 0.7; animation-duration: 20s; animation-delay: -8s; }\n@keyframes fogDrift {\n  0%, 100% { transform: translateX(-4%); }\n  50%      { transform: translateX(4%); }\n}\n\n/* --- Floating fireflies / magical motes --- */\n.bg-motes { position: absolute; inset: 0; pointer-events: none; }\n.mote {\n  position: absolute;\n  width: 4px; height: 4px;\n  border-radius: 50%;\n  background: rgba(196, 248, 255, 0.95);\n  box-shadow: 0 0 8px rgba(34, 211, 238, 0.85), 0 0 18px rgba(34, 211, 238, 0.45);\n  animation: float 9s ease-in-out infinite;\n}\n.mote.purple { background: rgba(221, 214, 254, 0.95); box-shadow: 0 0 8px rgba(167, 139, 250, 0.85), 0 0 18px rgba(167, 139, 250, 0.4); }\n.mote.emerald { background: rgba(187, 247, 208, 0.95); box-shadow: 0 0 8px rgba(52, 211, 153, 0.85), 0 0 18px rgba(52, 211, 153, 0.4); }\n.mote.amber { background: rgba(254, 230, 175, 0.95); box-shadow: 0 0 8px rgba(251, 191, 36, 0.7), 0 0 18px rgba(251, 191, 36, 0.35); }\n.mote.sm { width: 2px; height: 2px; box-shadow: 0 0 6px rgba(34, 211, 238, 0.6); }\n@keyframes float {\n  0%   { transform: translate3d(0, 0, 0);    opacity: 0.2; }\n  20%  { opacity: 1; }\n  50%  { transform: translate3d(20px, -28px, 0); opacity: 0.9; }\n  80%  { opacity: 0.8; }\n  100% { transform: translate3d(-6px, -56px, 0); opacity: 0; }\n}\n\n/* --- Subtle vignette so edges fade to deep void --- */\n.bg-vignette {\n  position: absolute;\n  inset: 0;\n  background:\n    radial-gradient(ellipse 120% 80% at 50% 50%, transparent 55%, rgba(3, 5, 15, 0.55) 100%);\n  pointer-events: none;\n}\n\n/* --- Faint scanline overlay (tech accent) --- */\n.scanline {\n  position: absolute;\n  inset: 0;\n  background: repeating-linear-gradient(\n    to bottom,\n    rgba(255, 255, 255, 0.010) 0,\n    rgba(255, 255, 255, 0.010) 1px,\n    transparent 1px,\n    transparent 3px\n  );\n  pointer-events: none;\n  opacity: 0.45;\n  mix-blend-mode: overlay;\n}\n\n/* =========================================================\n   Layout\n   ========================================================= */\n.shell {\n  position: relative;\n  z-index: 1;\n  max-width: 1280px;\n  margin: 0 auto;\n  padding: 0 32px;\n}\n\nsection { position: relative; z-index: 1; }\n\n.section-head {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  gap: 24px;\n  margin-bottom: 36px;\n}\n.section-head .eyebrow {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.18em;\n  color: var(--cyan);\n  text-transform: uppercase;\n  margin-bottom: 10px;\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.section-head .eyebrow::before {\n  content: \"\";\n  width: 18px; height: 1px;\n  background: var(--cyan);\n  box-shadow: 0 0 8px var(--cyan-glow);\n}\n.section-head h2 {\n  font-family: var(--font-display);\n  font-size: clamp(28px, 3.2vw, 40px);\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  line-height: 1.1;\n  margin: 0;\n  max-width: 620px;\n}\n.section-head .head-aside {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text-3);\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  white-space: nowrap;\n}\n.section-head .head-aside a {\n  color: var(--text-1);\n  border-bottom: 1px dashed var(--line-strong);\n  padding-bottom: 2px;\n}\n.section-head .head-aside a:hover { color: var(--cyan); border-color: var(--cyan); }\n\n/* =========================================================\n   Navbar\n   ========================================================= */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  backdrop-filter: blur(16px) saturate(120%);\n  -webkit-backdrop-filter: blur(16px) saturate(120%);\n  background: linear-gradient(180deg, rgba(4, 7, 18, 0.88), rgba(4, 7, 18, 0.62));\n  border-bottom: 1px solid var(--line);\n}\n.nav-inner {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  height: 68px;\n}\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  font-family: var(--font-mono);\n  font-size: 14px;\n  letter-spacing: 0.04em;\n}\n.brand-mark {\n  display: inline-grid;\n  place-items: center;\n  width: 36px;\n  height: 36px;\n  border: 1px solid var(--line-strong);\n  border-radius: 8px;\n  background: linear-gradient(180deg, rgba(34, 211, 238, 0.12), rgba(34, 211, 238, 0.02));\n  position: relative;\n  overflow: hidden;\n}\n.brand-mark::before {\n  /* pixel corner cuts */\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background:\n    linear-gradient(45deg, transparent 6px, var(--bg-0) 6px) top left / 8px 8px no-repeat,\n    linear-gradient(-45deg, transparent 6px, var(--bg-0) 6px) top right / 8px 8px no-repeat,\n    linear-gradient(135deg, transparent 6px, var(--bg-0) 6px) bottom left / 8px 8px no-repeat,\n    linear-gradient(-135deg, transparent 6px, var(--bg-0) 6px) bottom right / 8px 8px no-repeat;\n}\n.brand-mark span {\n  font-family: var(--font-pixel);\n  font-size: 22px;\n  color: var(--cyan);\n  text-shadow: 0 0 12px var(--cyan-glow);\n  line-height: 1;\n  position: relative;\n  z-index: 1;\n}\n.brand-name { color: var(--text-1); font-weight: 500; }\n.brand-name .dot { color: var(--cyan); }\n\n.nav-links {\n  display: flex;\n  align-items: center;\n  gap: 4px;\n  padding: 4px;\n  border: 1px solid var(--line);\n  border-radius: 999px;\n  background: rgba(255, 255, 255, 0.02);\n}\n.nav-links a {\n  font-size: 13.5px;\n  color: var(--text-2);\n  padding: 8px 16px;\n  border-radius: 999px;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  transition: color 0.15s ease, background 0.15s ease;\n}\n.nav-links a:hover { color: var(--text-1); }\n.nav-links a.is-active {\n  color: var(--text-1);\n  background: linear-gradient(180deg, rgba(34, 211, 238, 0.15), rgba(34, 211, 238, 0.03));\n  border: 1px solid rgba(34, 211, 238, 0.25);\n}\n.nav-links a.is-active::before {\n  content: \"\";\n  width: 6px; height: 6px;\n  background: var(--cyan);\n  box-shadow: 0 0 8px var(--cyan-glow);\n}\n\n.nav-cta {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.nav-status {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text-2);\n  padding: 6px 10px;\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  background: rgba(255, 255, 255, 0.02);\n}\n.nav-status .pulse {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: var(--emerald);\n  box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);\n  animation: pulse 2s infinite;\n}\n@keyframes pulse {\n  0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.55); }\n  70% { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }\n  100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }\n}\n\n.mobile-toggle {\n  display: none;\n  width: 40px; height: 40px;\n  border-radius: 10px;\n  border: 1px solid var(--line-strong);\n  background: rgba(255, 255, 255, 0.02);\n  color: var(--text-1);\n  cursor: pointer;\n  align-items: center;\n  justify-content: center;\n  padding: 0;\n}\n.mobile-toggle svg { width: 20px; height: 20px; }\n\n/* =========================================================\n   Buttons\n   ========================================================= */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 11px 18px;\n  border-radius: 10px;\n  font-size: 14px;\n  font-weight: 500;\n  letter-spacing: 0.01em;\n  cursor: pointer;\n  transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;\n  border: 1px solid transparent;\n  white-space: nowrap;\n}\n.btn svg { width: 16px; height: 16px; }\n\n.btn-primary {\n  background: linear-gradient(180deg, #2bd6f0, #0ea5b8);\n  color: #032027;\n  border-color: rgba(255, 255, 255, 0.18);\n  box-shadow:\n    0 0 0 1px rgba(34, 211, 238, 0.3),\n    0 10px 30px -10px rgba(34, 211, 238, 0.6),\n    inset 0 1px 0 rgba(255, 255, 255, 0.35);\n  font-weight: 600;\n}\n.btn-primary:hover {\n  transform: translateY(-1px);\n  box-shadow:\n    0 0 0 1px rgba(34, 211, 238, 0.5),\n    0 18px 40px -10px rgba(34, 211, 238, 0.7),\n    inset 0 1px 0 rgba(255, 255, 255, 0.4);\n}\n\n.btn-ghost {\n  background: rgba(255, 255, 255, 0.02);\n  color: var(--text-1);\n  border-color: var(--line-strong);\n}\n.btn-ghost:hover {\n  background: rgba(255, 255, 255, 0.05);\n  border-color: rgba(34, 211, 238, 0.5);\n  color: var(--cyan-2);\n}\n\n.btn-sm { padding: 8px 13px; font-size: 12.5px; border-radius: 8px; }\n.btn-lg { padding: 14px 22px; font-size: 15px; }\n\n/* Key hint chip */\n.key-hint {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  padding: 2px 6px;\n  border: 1px solid var(--line-strong);\n  border-radius: 5px;\n  color: var(--text-2);\n  background: rgba(255, 255, 255, 0.03);\n}\n\n/* =========================================================\n   Pixel frame helper\n   ========================================================= */\n.pixel-corner {\n  position: absolute;\n  width: 12px; height: 12px;\n  pointer-events: none;\n}\n.pixel-corner::before, .pixel-corner::after {\n  content: \"\";\n  position: absolute;\n  background: var(--cyan);\n  box-shadow: 0 0 6px var(--cyan-glow);\n}\n.pixel-corner.tl { top: -1px; left: -1px; }\n.pixel-corner.tl::before { top: 0; left: 0; width: 12px; height: 2px; }\n.pixel-corner.tl::after  { top: 0; left: 0; width: 2px; height: 12px; }\n.pixel-corner.tr { top: -1px; right: -1px; }\n.pixel-corner.tr::before { top: 0; right: 0; width: 12px; height: 2px; }\n.pixel-corner.tr::after  { top: 0; right: 0; width: 2px; height: 12px; }\n.pixel-corner.bl { bottom: -1px; left: -1px; }\n.pixel-corner.bl::before { bottom: 0; left: 0; width: 12px; height: 2px; }\n.pixel-corner.bl::after  { bottom: 0; left: 0; width: 2px; height: 12px; }\n.pixel-corner.br { bottom: -1px; right: -1px; }\n.pixel-corner.br::before { bottom: 0; right: 0; width: 12px; height: 2px; }\n.pixel-corner.br::after  { bottom: 0; right: 0; width: 2px; height: 12px; }\n\n/* Generic glass panel */\n.panel {\n  position: relative;\n  background: var(--panel);\n  border: 1px solid var(--line-2);\n  border-radius: var(--r-lg);\n  backdrop-filter: blur(10px);\n  -webkit-backdrop-filter: blur(10px);\n  box-shadow: var(--shadow-panel);\n}\n\n/* =========================================================\n   HERO\n   ========================================================= */\n.hero {\n  padding: 88px 0 96px;\n}\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.05fr 0.95fr;\n  gap: 56px;\n  align-items: center;\n}\n.hero-meta {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 7px 12px;\n  border-radius: 999px;\n  background: rgba(34, 211, 238, 0.08);\n  border: 1px solid rgba(34, 211, 238, 0.25);\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--cyan-2);\n  margin-bottom: 28px;\n  white-space: nowrap;\n  max-width: 100%;\n  overflow: hidden;\n  text-overflow: ellips  font-family: var(--font-mono);\n  font-size: 13.5px;\n  line-height: 1.65;\n  color: var(--text-1);\n  min-height: 360px;\n}\n.line { display: block; }\n.line .prompt { color: var(--cyan); }\n.line .cmd { color: var(--text-1); }\n.line .out { color: var(--text-2); }\n.line .com { color: var(--text-3); }\n.line .key { color: var(--purple); }\n.line .str { color: var(--emerald); }\n.line .num { color: var(--amber); }\n.line .fn  { color: var(--blue); }\n.term-cursor {\n  display: inline-block;\n  width: 8px; height: 16px;\n  background: var(--cyan);\n  vertical-align: -3px;\n  box-shadow: 0 0 10px var(--cyan-glow);\n  animation: blink 1.1s steps(1) infinite;\n}\n\n/* =========================================================\n   CHARACTER PROFILE (biodata RPG card)\n   ========================================================= */\n.profile {\n  padding: 60px 0 32px;\n}\n.profile-card {\n  display: grid;\n  grid-template-columns: 280px 1fr 1fr;\n  gap: 0;\n  position: relative;\n  overflow: hidden;\n}\n.profile-avatar {\n  border-right: 1px solid var(--line-2);\n  padding: 28px;\n  background:\n    radial-gradient(180px 180px at 50% 40%, rgba(34, 211, 238, 0.18), transparent 70%),\n    linear-gradient(180deg, rgba(34, 211, 238, 0.06), transparent);\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n  gap: 16px;\n}\n.avatar-frame {\n  position: relative;\n  width: 168px;\n  height: 168px;\n  border-radius: 14px;\n  background:\n    linear-gradient(135deg, rgba(34, 211, 238, 0.25), rgba(167, 139, 250, 0.25));\n  padding: 3px;\n}\n.avatar-inner {\n  width: 100%;\n  height: 100%;\n  border-radius: 12px;\n  background: var(--bg-1);\n  display: grid;\n  place-items: center;\n  overflow: hidden;\n  position: relative;\n}\n.avatar-pixel {\n  /* Stylized pixel-art bust placeholder */\n  width: 120px;\n  height: 120px;\n}\n.avatar-name {\n  font-family: var(--font-pixel);\n  font-size: 18px;\n  letter-spacing: et: 0;\n  background-image: linear-gradient(to right, rgba(0, 0, 0, 0.25) 1px, transparent 1px);\n  background-size: 8px 100%;\n  opacity: 0.5;\n}\n.bar.violet .bar-fill { background: linear-gradient(90deg, #c4b5fd, var(--purple)); box-shadow: 0 0 12px rgba(167, 139, 250, 0.35); }\n.bar.emerald .bar-fill { background: linear-gradient(90deg, #6ee7b7, var(--emerald)); box-shadow: 0 0 12px rgba(52, 211, 153, 0.35); }\n.bar.amber .bar-fill { background: linear-gradient(90deg, #fde68a, var(--amber)); box-shadow: 0 0 12px rgba(251, 191, 36, 0.3); }\n\n.profile-strip {\n  grid-column: 1 / -1;\n  border-top: 1px solid var(--line-2);\n  padding: 14px 28px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 24px;\n  background: rgba(255, 255, 255, 0.015);\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text-3);\n  flex-wrap: wrap;\n}\n.profile-strip .tags { display: flex; gap: 8px; flex-wrap: wrap; }\n\n.tag {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 5px 10px;\n  font-family: var(--font-mono);\n  font-size: 11.5px;\n  border: 1px solid var(--line-2);\n  border-radius: 6px;\n  color: var(--text-2);\n  background: rgba(255, 255, 255, 0.02);\n  letter-spacing: 0.02em;\n}\n.tag .swatch { width: 7px; height: 7px; border-radius: 2px; background: var(--cyan); }\n.tag.purple .swatch { background: var(--purple); }\n.tag.emerald .swatch { background: var(--emerald); }\n.tag.amber .swatch { background: var(--amber); }\n.tag.blue .swatch { background: var(--blue); }\n.tag.rose .swatch { background: var(--rose); }\n\n/* =========================================================\n   PORTFOLIO\n   ========================================================= */\n.portfolio { padding: 80px 0; }\n.portfolio-grid {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr;\n  gap: 22px;\n}\n.project-card {\n  position: relative;\n  border-radius: var(--r-lg);\n  overflow: hidden;\n  border: 1px solid var(--line-2); ES\n   ========================================================= */\n.devnotes { padding: 80px 0; }\n.notes-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 18px;\n}\n.note-card {\n  position: relative;\n  padding: 0;\n  border: 1px solid var(--line-2);\n  border-radius: var(--r-lg);\n  background: linear-gradient(180deg, rgba(10, 17, 36, 0.7), rgba(6, 9, 18, 0.85));\n  overflow: hidden;\n  transition: transform 0.2s ease, border-color 0.2s ease;\n  display: flex;\n  flex-direction: column;\n}\n.note-card:hover { border-color: rgba(34, 211, 238, 0.4); transform: translateY(-2px); }\n.note-head {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 12px 16px;\n  border-bottom: 1px solid var(--line);\n  background: rgba(255, 255, 255, 0.02);\n}\n.note-cat {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--cyan-2);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n}\n.note-cat .pill {\n  width: 7px; height: 7px; border-radius: 2px; background: var(--cyan);\n  box-shadow: 0 0 8px var(--cyan-glow);\n}\n.note-cat.purple { color: #c4b5fd; }\n.note-cat.purple .pill { background: var(--purple); box-shadow: 0 0 8px rgba(167, 139, 250, 0.5); }\n.note-cat.emerald { color: #6ee7b7; }\n.note-cat.emerald .pill { background: var(--emerald); box-shadow: 0 0 8px rgba(52, 211, 153, 0.5); }\n.note-cat.amber { color: #fcd34d; }\n.note-cat.amber .pill { background: var(--amber); box-shadow: 0 0 8px rgba(251, 191, 36, 0.4); }\n.note-cat.rose { color: #fda4af; }\n.note-cat.rose .pill { background: var(--rose); box-shadow: 0 0 8px rgba(251, 113, 133, 0.4); }\n.note-id {\n  font-family: var(--font-pixel);\n  font-size: 14px;\n  color: var(--text-3);\n  letter-spacing: 0.08em;\n}\n.note-body { padding: 18px 18px 16px; flex: 1; display: flex; flex-direction: column; gap: 12px; }\n.note-title {\n  font-family: var(--font-display);\n  font-size: 17px;\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n.note-cmd {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  padding: 10px 12px;\n  background: rgba(6, 9, 18, 0.7);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  color: var(--text-1);\n  display: block;\n  white-space: pre-wrap;\n  word-break: break-word;\n}\n.note-cmd .prompt { color: var(--cyan); margin-right: 6px; }\n.note-cmd .flag { color: var(--purple); }\n.note-cmd .arg { color: var(--emerald); }\n.note-desc {\n  font-size: 13px;\n  color: var(--text-2);\n  line-height: 1.55;\n  margin: 0;\n}\n.note-foot {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  padding: 10px 16px;\n  border-top: 1px solid var(--line);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-3);\n}\n.note-foot a { color: var(--cyan-2); display: inline-flex; align-items: center; gap: 6px; }\n\n/* =========================================================\n   SKILL TREE\n   ========================================================= */\n.skilltree { padding: 80px 0; }\n.skilltree-wrap {\n  position: relative;\n  padding: 32px 28px 28px;\n  overflow: hidden;\n}\n.skilltree-canvas {\n  position: relative;\n  height: 440px;\n  width: 100%;\n}\n.skilltree-canvas svg.lines {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  pointer-events: none;\n}\n.skill-node {\n  position: absolute;\n  transform: translate(-50%, -50%);\n  min-width: 132px;\n  padding: 12px 14px;\n  border-radius: 12px;\n  background: rgba(10, 17, 36, 0.92);\n  border: 1px solid var(--line-2);\n  text-align: left;\n  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;\n  cursor: default;\n  z-index: 2;\n}\n.skill-node:hover {\n  border-color: rgba(34, 211, 238, 0.55);\n  box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.35), 0 18px 40px -16px rgba(34, 211, 238, 0.5);\n  transform: translate(-50%, -50%) scale(1.04);\n  z-index: 3;\n}\n.skill-node .row {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  margin-bottom: 6px;\n}\n.skill-node .row .ico {\n  width: 26px; height: 26px;\n  border-radius: 6px;\n  display: grid; place-items: center;\n  font-family: var(--font-pixel);\n  font-size: 14px;\n  background: rgba(34, 211, 238, 0.15);\n  color: var(--cyan-2);\n  border: 1px solid rgba(34, 211, 238, 0.3);\n}\n.skill-node .name { font-size: 13.5px; font-weight: 500; color: var(--text-1); }\n.skill-node .lvl {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  color: var(--text-3);\n  letter-spacing: 0.08em;\n}\n.skill-node .lvl .strong { color: var(--cyan-2); }\n\n.skill-node.core {\n  min-width: 160px;\n  background: linear-gradient(180deg, rgba(34, 211, 238, 0.18), rgba(34, 211, 238, 0.04));\n  border-color: rgba(34, 211, 238, 0.5);\n  box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.25), 0 30px 60px -20px rgba(34, 211, 238, 0.45);\n}\n.skill-node.core .ico { background: var(--cyan); color: var(--bg-0); border-color: rgba(255, 255, 255, 0.3); }\n.skill-node.core .name { font-size: 15px; }\n\n.skill-node.purple .ico { background: rgba(167, 139, 250, 0.18); color: #c4b5fd; border-color: rgba(167, 139, 250, 0.35); }\n.skill-node.purple .lvl .strong { color: #c4b5fd; }\n.skill-node.emerald .ico { background: rgba(52, 211, 153, 0.18); color: #6ee7b7; border-color: rgba(52, 211, 153, 0.35); }\n.skill-node.emerald .lvl .strong { color: #6ee7b7; }\n.skill-node.amber .ico { background: rgba(251, 191, 36, 0.18); color: #fcd34d; border-color: rgba(251, 191, 36, 0.35); }\n.skill-node.amber .lvl .strong { color: #fcd34d; }\n.skill-node.locked {\n  opacity: 0.55;\n  border-style: dashed;\n}\n.skill-node.locked .ico { background: rgba(255, 255, 255, 0.04); color: var(--text-3); border-color: var(--line); }\n.skill-node.locked .lvl .strong { color: var(--text-3); }\n\n.skill-legend {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 14px;\n  margin-top: 22px;\n  padding-top: 18px;\n  border-top: 1px dashed var(--line-2);\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text-3);\n}\n.skill-legend .lg {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n}\n.skill-legend .sw { width: 10px; height: 10px; border-radius: 3px; }\n\n/* =========================================================\n   CONTACT CTA\n   ========================================================= */\n.contact { padding: 80px 0 96px; }\n.contact-panel {\n  position: relative;\n  padding: 56px 56px 48px;\n  border-radius: var(--r-xl);\n  overflow: hidden;\n  background:\n    radial-gradient(700px 360px at 20% 0%, rgba(34, 211, 238, 0.16), transparent 60%),\n    radial-gradient(600px 300px at 100% 100%, rgba(167, 139, 250, 0.18), transparent 60%),\n    linear-gradient(180deg, rgba(14, 22, 48, 0.85), rgba(10, 17, 36, 0.95));\n  border: 1px solid var(--line-2);\n}\n.contact-panel::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background-image:\n    linear-gradient(to right, rgba(120, 180, 255, 0.08) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(120, 180, 255, 0.08) 1px, transparent 1px);\n  background-size: 36px 36px;\n  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 30%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 30%, transparent 80%);\n  pointer-events: none;\n}\n.contact-panel > * { position: relative; z-index: 1; }\n.contact-grid {\n  display: grid;\n  grid-template-columns: 1.2fr 1fr;\n  gap: 48px;\n  align-items: center;\n}\n.contact-eyebrow {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.2em;\n  color: var(--cyan);\n  text-transform: uppercase;\n  margin-bottom: 16px;\n  display: inline-flex;\n  gap: 10px;\n  align-items: center;\n}\n.contact h2 {\n  font-family: var(--font-display);\n  font-size: clamp(32px, 4vw, 48px);\n  font-weight: 600;\n  letter-spacing: -0.025em;\n  line-height: 1.05;\n  margin: 0 0 18px;\n  text-wrap: balance;\n}\n.contact h2 .accent {\n  background: linear-gradient(180deg, #c4f8ff, var(--cyan));\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.contact p {\n  color: var(--text-2);\n  font-size: 16px;\n  line-height: 1.6;\n  margin: 0 0 28px;\n  max-width: 520px;\n}\n.contact-actions { display: flex; gap: 12px; flex-wrap: wrap; }\n\n.contact-list {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n}\n.contact-row {\n  display: grid;\n  grid-template-columns: 36px 1fr auto;\n  gap: 14px;\n  align-items: center;\n  padding: 12px 16px;\n  border: 1px solid var(--line-2);\n  border-radius: 12px;\n  background: rgba(6, 9, 18, 0.55);\n  transition: border-color 0.2s ease, background 0.2s ease;\n}\n.contact-row:hover { border-color: rgba(34, 211, 238, 0.45); background: rgba(34, 211, 238, 0.05); }\n.contact-row .ico {\n  width: 36px; height: 36px; border-radius: 8px;\n  display: grid; place-items: center;\n  background: rgba(34, 211, 238, 0.1);\n  border: 1px solid rgba(34, 211, 238, 0.25);\n  color: var(--cyan-2);\n}\n.contact-row.purple .ico { background: rgba(167, 139, 250, 0.1); border-color: rgba(167, 139, 250, 0.3); color: #c4b5fd; }\n.contact-row.emerald .ico { background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.3); color: #6ee7b7; }\n.contact-row.amber .ico { background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.3); color: #fcd34d; }\n.contact-row .label { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2px; }\n.contact-row .value { color: var(--text-1); font-size: 14px; }\n.contact-row .go {\n  width: 28px; height: 28px;\n  border-radius: 6px;\n  border: 1px solid var(--line);\n  display: grid; place-items: center;\n  color: var(--text-2);\n}\n.contact-row:hover .go { background: var(--cyan); color: var(--bg-0); border-color: var(--cyan); }\n\n/* =========================================================\n   FOOTER\n   ========================================================= */\n.footer {\n  position: relative;\n  z-index: 1;\n  border-top: 1px solid var(--line);\n  padding: 36px 0 28px;\n  margin-top: 40px;\n  background: rgba(6, 9, 18, 0.6);\n}\n.footer-inner {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  gap: 24px;\n  flex-wrap: wrap;\n}\n.footer .left {\n  display: flex; align-items: center; gap: 14px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text-3);\n}\n.footer .left .heart { color: var(--rose); }\n.footer .links { display: flex; gap: 18px; font-family: var(--font-mono); font-size: 12px; }\n.footer .links a { color: var(--text-2); }\n.footer .links a:hover { color: var(--cyan); }\n.footer .right {\n  font-family: var(--font-pixel);\n  font-size: 16px;\n  color: var(--text-3);\n  letter-spacing: 0.06em;\n}\n\n/* =========================================================\n   Mobile menu (slide-down panel)\n   ========================================================= */\n.mobile-menu {\n  display: none;\n  position: fixed;\n  top: 68px;\n  left: 0;\n  right: 0;\n  background: rgba(6, 9, 18, 0.96);\n  backdrop-filter: blur(14px);\n  border-bottom: 1px solid var(--line-2);\n  z-index: 49;\n  padding: 14px 20px 22px;\n}\n.mobile-menu.open { display: block; }\n.mobile-menu nav { display: flex; flex-direction: column; gap: 4px; }\n.mobile-menu nav a {\n  padding: 12px 14px;\n  border-radius: 10px;\n  font-size: 15px;\n  color: var(--text-1);\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  border: 1px solid transparent;\n}\n.mobile-menu nav a:hover { background: rgba(255, 255, 255, 0.04); border-color: var(--line); }\n.mobile-menu nav a span.k { font-family: var(--font-mono); color: var(--text-3); font-size: 12px; }\n.mobile-menu .mm-cta { margin-top: 12px; display: flex; gap: 10px; }\n.mobile-menu .mm-cta .btn { flex: 1; justify-content: center; }\n\n/* =========================================================\n   Responsive\n   ========================================================= */\n/* Hide the \"AVAILABLE FOR HIRE\" status pill before the nav row gets cramped */\n@media (max-width: 1080px) {\n  .nav-status { display: none; }\n}\n\n/* Switch the full nav over to the hamburger before the pill nav has to wrap */\n@media (max-width: 960px) {\n  .nav-links { display: none; }\n  .mobile-toggle { display: inline-flex; }\n  /* On this range, the brand-side CTA can be hidden too — the mobile menu has its own */\n  .nav-cta .btn-primary { display: none; }\n}\n\n@media (max-width: 1100px) {\n  .hero-grid { grid-template-columns: 1fr; gap: 40px; }\n  .portfolio-grid { grid-template-columns: 1fr; }\n  .services-grid { grid-template-columns: repeat(2, 1fr); }\n  .notes-grid { grid-template-columns: repeat(2, 1fr); }\n  .contact-grid { grid-template-columns: 1fr; gap: 32px; }\n  .profile-card { grid-template-columns: 220px 1fr; }\n  .profile-bars { grid-column: 1 / -1; border-top: 1px solid var(--line-2); }\n  .profile-stats { border-right: none; }\n}\n\n@media (max-width: 720px) {\n  .shell { padding: 0 20px; }\n  .hero { padding: 56px 0 64px; }\n  .hero h1 { font-size: 44px; }\n  .terminal-body { font-size: 12px; padding: 16px; min-height: 320px; }\n  .profile-card { grid-template-columns: 1fr; }\n  .profile-avatar { border-right: none; border-bottom: 1px solid var(--line-2); padding: 24px; }\n  .profile-stats { border-right: none; }\n  .services-grid { grid-template-columns: 1fr; }\n  .notes-grid { grid-template-columns: 1fr; }\n  .contact-panel { padding: 32px 24px; }\n  .section-head { flex-direction: column; align-items: flex-start; }\n  .skilltree-canvas { height: auto; display: flex; flex-direction: column; gap: 12px; }\n  .skilltree-canvas svg.lines { display: none; }\n  .skill-node { position: relative; left: auto !important; top: auto !important; transform: none; width: 100%; }\n  .skill-node:hover { transform: none; }\n  .hero-stats { gap: 22px; }\n  .footer-inner { flex-direction: column; align-items: flex-start; gap: 12px; }\n}\n\n/* Reveal on scroll */\n.reveal {\n  opacity: 0;\n  transform: translateY(16px);\n  transition: opacity 0.7s ease, transform 0.7s ease;\n}\n.reveal.in {\n  opacity: 1;\n  transform: none;\n}\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n\n<!-- ===================== BACKGROUND (RPG world) ===================== -->\n<div class=\"page-bg\" aria-hidden=\"true\">\n  <div class=\"bg-stars\"><\u002Fdiv>\n\n  <!-- Day clouds (faded in during day phases) -->\n  <div class=\"bg-clouds\">\n    <div class=\"cloud cloud-1\"><\u002Fdiv>\n    <div class=\"cloud cloud-2\"><\u002Fdiv>\n    <div class=\"cloud cloud-3\"><\u002Fdiv>\n    <div class=\"cloud cloud-4\"><\u002Fdiv>\n    <div class=\"cloud cloud-5\"><\u002Fdiv>\n    <div class=\"cloud cloud-6\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Celestial bodies (positions animated via CSS vars) -->\n  <div class=\"bg-moon\"><\u002Fdiv>\n  <div class=\"bg-sun\"><\u002Fdiv>\n\n  <div class=\"bg-grid\"><\u002Fdiv>\n  <div class=\"bg-horizon\"><\u002Fdiv>\n\n  <!-- Far mountain range — soft blue-purple silhouettes -->\n  <div class=\"bg-layer bg-mtn-far\">\n    <svg viewBox=\"0 0 1440 220\" preserveAspectRatio=\"none\">\n      <defs>\n        <linearGradient id=\"mtnFar\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n          <stop offset=\"0%\" style=\"stop-color: var(--mtn-far-top)\"><\u002Fstop>\n          <stop offset=\"100%\" style=\"stop-color: var(--mtn-far-bot)\"><\u002Fstop>\n        <\u002FlinearGradient>\n      <\u002Fdefs>\n      <polygon fill=\"url(#mtnFar)\" points=\"0,220 0,140 80,90 150,120 230,70 320,110 410,60 510,100 610,50 720,95 820,55 940,100 1050,65 1170,105 1290,75 1380,110 1440,90 1440,220\"><\u002Fpolygon>\n      <!-- rim light -->\n      <polyline fill=\"none\" style=\"stroke: var(--rim-far)\" stroke-width=\"1\" points=\"80,90 150,120 230,70 320,110 410,60 510,100 610,50 720,95 820,55 940,100 1050,65 1170,105 1290,75 1380,110\"><\u00 14<\u002Fspan>\n        <\u002Fheader>\n        <div class=\"note-body\">\n          <h3 class=\"note-title\">Undo the last commit (keep changes)<\u002Fh3>\n          <code class=\"note-cmd\"><span class=\"prompt\">$<\u002Fspan>git reset <span class=\"flag\">--soft<\u002Fspan> <span class=\"arg\">HEAD~1<\u002Fspan><\u002Fcode>\n          <p class=\"note-desc\">Moves HEAD back one commit but leaves files staged. Perfect when you committed too early and want to rework the message or split the change.<\u002Fp>\n        <\u002Fdiv>\n        <footer class=\"note-foot\">\n          <span>2 min read<\u002Fspan>\n          <a href=\"#\">Open →<\u002Fa>\n        <\u002Ffooter>\n      <\u002Farticle>\n\n      <article class=\"note-card reveal\">\n        <header class=\"note-head\">\n          <span class=\"note-cat emerald\"><span class=\"pill\"><\u002Fspan>Docker<\u002Fspan>\n          <span class=\"note-id\">#022<\u002Fspan>\n        <\u002Fheader>\n        <div class=\"note-body\">\n          <h3 class=\"note-title\">Stop all running containers<\u002Fh3>\n          <code class=\"note-cmd\"><span class=\"prompt\">$<\u002Fspan>docker stop <span class=\"arg\">$(docker ps -q)<\u002Fspan><\u002Fcode>\n          <p class=\"note-desc\">Quickly halt every running container. Handy after a long dev session before switching projects or rebooting the machine.<\u002Fp>\n        <\u002Fdiv>\n        <footer class=\"note-foot\">\n          <span>1 min read<\u002Fspan>\n          <a href=\"#\">Open →<\u002Fa>\n        <\u002Ffooter>\n      <\u002Farticle>\n\n      <article class=\"note-card reveal\">\n        <header class=\"note-head\">\n          <span class=\"note-cat amber\"><span class=\"pill\"><\u002Fspan>Flutter<\u002Fspan>\n          <span class=\"note-id\">#030<\u002Fspan>\n        <\u002Fheader>\n        <div class=\"note-body\">\n          <h3 class=\"note-title\">Clean &amp; rebuild after a weird crash<\u002Fh3>\n          <code class=\"note-cmd\"><span class=\"prompt\">$<\u002Fspan>flutter clean &amp;&amp; flutter pub get<\u002Fcode>\n          <p class=\"note-desc\">When the build cache lies to you. Wipes <code>build/<\u002Fcode> and re-resolves dependencies — fixes the majority of \"it worked yesterday\" issues.<\u002Fp>\n        <\u002Fdiv>\n        <footer class=\"note-foot\">\n          <span>2 min read<\u002Fspan>\n          <a href=\"#\">Open →<\u002Fa>\n        <\u002Ffooter>\n      <\u002Farticle>\n\n      <article class=\"note-card reveal\">\n        <header class=\"note-head\">\n          <span class=\"note-cat rose\"><span class=\"pill\"><\u002Fspan>MySQL<\u002Fspan>\n          <span class=\"note-id\">#041<\u002Fspan>\n        <\u002Fheader>\n        <div class=\"note-body\">\n          <h3 class=\"note-title\">Dump a single table for backup<\u002Fh3>\n          <code class=\"note-cmd\"><span class=\"prompt\">$<\u002Fspan>mysqldump <span class=\"flag\">-u<\u002Fspan> root <span class=\"flag\">-p<\u002Fspan> db users <span class=\"flag\">&gt;<\u002Fspan> users.sql<\u002Fcode>\n          <p class=\"note-desc\">Exports just one table — fast and small. Useful for sharing a sample dataset or restoring specific data without touching the rest.<\u002Fp>\n        <\u002Fdiv>\n        <footer class=\"note-foot\">\n          <span>2 min read<\u002Fspan>\n          <a href=\"#\">Open →<\u002Fa>\n        <\u002Ffooter>\n      <\u002Farticle>\n\n      <article class=\"note-card reveal\">\n        <header class=\"note-head\">\n          <span class=\"note-cat\"><span class=\"pill\"><\u002Fspan>Terminal<\u002Fspan>\n          <span class=\"note-id\">#055<\u002Fspan>\n        <\u002Fheader>\n        <div class=\"note-body\">\n          <h3 class=\"note-title\">Find files modified in the last hour<\u002Fh3>\n          <code class=\"note-cmd\"><span class=\"prompt\">$<\u002Fspan>find . <span class=\"flag\">-mmin<\u002Fspan> <span class=\"arg\">-60<\u002Fspan> <span class=\"flag\">-type<\u002Fspan> f<\u002Fcode>\n          <p class=\"note-desc\">Lists files changed in the last 60 minutes. Great for tracking down what got touched during a debugging spree.<\u002Fp>\n        <\u002Fdiv>\n        <footer class=\"note-foot\">\n          <span>1 min read<\u002Fspan>\n          <a href=\"#\">Open →<\u002Fa>\n        <\u002Ffooter>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== SKILL TREE ===================== -->\n<section class=\"skilltree\" id=\"skilltree\" data-screen-label=\"06 Skill Tree\">\n  <div class=\"shell\">\n    <div class=\"section-head reveal\">\n      <div>\n        <span class=\"eyebrow\">// skill.tree<\u002Fspan>\n        <h2>Tech stack, plotted like a skill tree<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"head-aside\">\n        Hover a node to inspect\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"panel skilltree-wrap reveal\">\n      <span class=\"pixel-corner tl\"><\u002Fspan><span class=\"pixel-corner tr\"><\u002Fspan>\n      <span class=\"pixel-corner bl\"><\u002Fspan><span class=\"pixel-corner br\"><\u002Fspan>\n\n      <div class=\"skilltree-canvas\" id=\"skilltree\">\n        <!-- connection lines -->\n        <svg class=\"lines\" viewBox=\"0 0 1000 440\" preserveAspectRatio=\"none\" aria-hidden=\"true\">\n          <defs>\n            <linearGradient id=\"lg\" x1=\"0\" x2=\"1\">\n              <stop offset=\"0%\" stop-color=\"#22d3ee\" stop-opacity=\"0.5\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#22d3ee\" stop-opacity=\"0.1\"><\u002Fstop>\n            <\u002FlinearGradient>\n          <\u002Fdefs>\n          <!-- core (500,220) to branches -->\n          <line x1=\"500\" y1=\"220\" x2=\"180\" y2=\"80\" stroke=\"url(#lg)\" stroke-width=\"1.5\"><\u002Fline>\n          <line x1=\"500\" y1=\"220\" x2=\"180\" y2=\"220\" stroke=\"url(#lg)\" stroke-width=\"1.5\"><\u002Fline>\n          <line x1=\"500\" y1=\"220\" x2=\"180\" y2=\"360\" stroke=\"url(#lg)\" stroke-width=\"1.5\"><\u002Fline>\n          <l
